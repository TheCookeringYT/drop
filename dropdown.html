<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eaglercraft Launcher</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
  :root {
    --red: #ff0000;
    --red-dark: #ff0000;
    --bg: #000;
    --font: 'Nunito', sans-serif;
  }
 
  html, body {
    height: 100%; width: 100%;
    background: var(--bg);
    font-family: var(--font);
    color: #fff;
    overflow: hidden;
  }
 
  #screen-select {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    max-width: 680px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    padding: 16px;
    animation: fadeIn 0.4s cubic-bezier(0.25, 1, 0.5, 1) forwards;
  }
 
  #screen-select.exit {
    animation: exitUp 0.3s cubic-bezier(0.25, 1, 0.5, 1) forwards;
  }
 
  .select-heading { text-align: center; }
  .select-heading h1 { font-size: 18px; font-weight: 900; letter-spacing: 0.04em; color: #fff; margin-bottom: 2px; }
  .select-heading p  { font-size: 11px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: #fff; opacity: 0.7; }
 
  .select-row {
    position: relative;
    width: 100%;
  }
 
  .pill-wrap { width: 100%; position: relative; }
 
  .pill-trigger {
    width: 100%;
    background: var(--red);
    border: none;
    border-radius: 999px;
    padding: 12px 20px;
    font-family: var(--font);
    font-size: 15px; font-weight: 700; color: #fff;
    cursor: pointer;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    transition: background 0.2s cubic-bezier(0.25, 1, 0.5, 1), border-radius 0.2s cubic-bezier(0.25, 1, 0.5, 1), transform 0.2s cubic-bezier(0.25, 1, 0.5, 1);
    outline: none;
  }
 
  .pill-trigger:hover { background: #e50000; transform: translateY(-1px); }
  .pill-trigger.open  { border-radius: 16px 16px 0 0; background: var(--red-dark); transform: none; }
 
  .pill-label { flex: 1; text-align: left; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; opacity: 0.8; transition: opacity 0.2s ease; }
  .pill-label.chosen { opacity: 1; }
 
  .pill-chevron { width: 18px; height: 18px; flex-shrink: 0; transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1); }
  .pill-trigger.open .pill-chevron { transform: rotate(180deg); }
 
  .drop-menu {
    display: none;
    position: absolute;
    top: 100%; left: 0; right: 0;
    background: #130000;
    border: 1px solid #3a0000;
    border-top: none;
    border-radius: 0 0 16px 16px;
    max-height: 220px;
    overflow-y: auto;
    z-index: 200;
    opacity: 0;
    transform: translateY(-4px);
  }
 
  .drop-menu.open { 
    display: block; 
    animation: menuSlideIn 0.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
  }
 
  .drop-menu::-webkit-scrollbar { width: 4px; }
  .drop-menu::-webkit-scrollbar-thumb { background: #3a0000; border-radius: 2px; }
 
  .group-hdr {
    padding: 8px 16px 2px;
    font-size: 8px; font-weight: 800; letter-spacing: 0.22em; text-transform: uppercase;
    color: #fff; border-top: 1px solid #1e0000;
  }
  .group-hdr:first-child { border-top: none; }
 
  .drop-item {
    padding: 9px 16px;
    font-size: 13px; font-weight: 700; color: #fff;
    cursor: pointer; display: flex; align-items: center; gap: 8px;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .drop-item:hover { background: rgba(255,0,0,0.13); color: #fff; }
  .drop-item:last-child { border-radius: 0 0 16px 16px; }
 
  .item-sz { margin-left: auto; font-size: 9px; font-weight: 600; color: #fff; flex-shrink: 0; }
 
  .badge { font-size: 7.5px; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase; border-radius: 3px; padding: 1px 4px; flex-shrink: 0; }
  .badge-wisp { background: #4a0aff; color: #ff0000; }
  .badge-wasm { background: #32CD32; color: #ff0000; }
  .badge-javs { background: #ffbf00; color: #ff0000; }
 
  .action-btns {
    display: flex;
    justify-content: center;
    gap: 10px;
    width: 100%;
  }
 
  .launch-pill, .dl-pill {
    background: #0d0000;
    border: 2px solid #1c1c1c;
    border-radius: 999px;
    padding: 10px 28px;
    font-family: var(--font);
    font-size: 14px; font-weight: 900; color: #444;
    cursor: default; white-space: nowrap;
    transition: background 0.25s ease, border-color 0.25s ease, color 0.25s ease, transform 0.2s cubic-bezier(0.25, 1, 0.5, 1);
    letter-spacing: 0.04em;
  }
 
  .dl-pill.activated {
    border-color: #333;
    color: #bbb;
    cursor: pointer;
  }
  .dl-pill.activated:hover {
    background: #111;
    border-color: #555;
    color: #fff;
    transform: translateY(-1px);
  }
 
  .launch-pill.activated {
    border-color: #330000;
    color: #bbb;
    cursor: pointer;
  }
  .launch-pill.activated:hover {
    background: var(--red);
    border-color: var(--red);
    color: #fff;
    transform: translateY(-1px);
  }
 
  @keyframes fadeIn { 
    from { opacity: 0; transform: translateY(-4px); } 
    to { opacity: 1; transform: translateY(0); } 
  }
  @keyframes exitUp { 
    from { opacity: 1; transform: translateY(0); } 
    to { opacity: 0; transform: translateY(-4px); } 
  }
  @keyframes menuSlideIn { 
    from { opacity: 0; transform: translateY(-4px); } 
    to { opacity: 1; transform: translateY(0); } 
  }
 
  @media (max-width: 520px) {
    .action-btns { flex-direction: column; width: 100%; gap: 6px; }
    .launch-pill, .dl-pill { text-align: center; width: 100%; }
  }
</style>
</head>
<body>
 
<div id="screen-select">
  <div class="select-heading">
    <h1>Select a version and click launch!</h1>
    <p>EaglercraftNOA · Eaglercraft Launcher</p>
  </div>
 
  <div class="select-row">
    <div class="pill-wrap">
      <button class="pill-trigger" id="pillTrigger">
        <span class="pill-label" id="pillLabel">Choose a version…</span>
        <svg class="pill-chevron" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="5 8 10 13 15 8"/>
        </svg>
      </button>
      <div class="drop-menu" id="dropMenu"></div>
    </div>
  </div>
 
  <div class="action-btns">
    <button class="dl-pill" id="dlBtn">Download</button>
    <button class="launch-pill" id="launchBtn">Launch</button>
  </div>
</div>
 
<script>
const BASE = "https://eaglercraftnoa.github.io/play/";
const RAW  = "https://raw.githubusercontent.com/EaglercraftNOA/play/main/";
 
const CATALOG = [
  { g:"Modern",  name:"26.1.2",          file:"eaglercraft-26.1.2-WASM_Novix.html",  b:["wasm"],        sz:"63 MB" },
  { g:"Modern",  name:"1.21.11",        file:"Eaglercraft-1-21-11_wasm.html",       b:["wasm"],        sz:"46 MB" },
  { g:"Modern",  name:"1.17",        file:"eaglercraft-1.17-wasm_gc.html",       b:["wasm"],        sz:"48 MB" },
  { g:"Modern",  name:"1.12.2",      file:"Eaglercraft_1.12.2-WASM-GC.html",     b:["wasm"],        sz:"24 MB" },
  { g:"Modern",  name:"1.12",                  file:"Eaglercraft_1.12_Javascriptl.html",               b:["javs"],              sz:"74 MB" },
  { g:"Modern",  name:"1.12",      file:"wispcraft-Eaglercraft-1.12.html",     b:["wisp"],        sz:"26 MB" },
  { g:"Modern",  name:"1.11.2",                file:"Eaglercraft-1.11.2.html",             b:["javs"],              sz:"27 MB" },
  { g:"Modern",  name:"1.9.4",                 file:"eaglercraftx-194.html",               b:["javs"],              sz:"17 MB" },
  { g:"Modern",  name:"1.8.8",                 file:"Eaglercraft-1.8.8.html",              b:["wasm"],        sz:"17 MB" },
  { g:"Modern",  name:"1.8",  file:"Eaglercraft-1.8_wasm-wispcraft.html", b:["wasm","wisp"], sz:"16 MB" },
  { g:"Modern",  name:"1.7",            file:"Eaglercraft-1.7-wasm.html",           b:["wasm"],        sz:"12 MB" },
  { g:"Modern",  name:"1.6.4",                 file:"Eaglercraft 1.6.4.html",              b:["javs"],              sz:"26 MB" },
  { g:"Modern",  name:"1.5.2",                 file:"1.5.2.html",                          b:["javs"],              sz:"22 MB" },
  { g:"Modern",  name:"1.5.2",       file:"Eaglercraft-1.5-wispcraft.html",      b:["wisp"],        sz:"24 MB" },
  { g:"Modern",  name:"1.4.7",          file:"Eaglercraft_1.4.7-WASM.html",         b:["wasm"],        sz:"38 MB" },
  { g:"Modern",  name:"1.2.5",          file:"Eaglercraft_1.2.5_wasm.html",         b:["wasm"],        sz:"23 MB" },
  { g:"Modern",  name:"1.1",                   file:"Eaglercraft_1.1.html",                b:["javs"],              sz:"8 MB"  },
  { g:"Modern",  name:"1.0.0",                 file:"Eaglercraft_1_0_0.html",              b:["javs"],              sz:"24 MB" },
  { g:"Modern",  name:"Mobile Edition",         file:"Eaglercraft Mobile.html",             b:["javs"],              sz:"15 MB" },
  { g:"Beta",    name:"Beta 1.8.1",     file:"Eaglercraft_beta 1.8.1_WASM.html",    b:["wasm"],        sz:"21 MB" },
  { g:"Beta",    name:"Beta 1.7.3",             file:"Beta_1.7.3.html",                     b:["javs"],              sz:"16 MB" },
  { g:"Beta",    name:"Beta 1.6.4",             file:"Eaglercraft_b-1_6_4.html",            b:["javs"],              sz:"23 MB" },
  { g:"Beta",    name:"Beta 1.5_01",             file:"Eaglercraft Beta 1.5_01.html",       b:["wasm"],        sz:"35 MB" },
 { g:"Beta",     name:"Beta 1.4",               file:"Eaglercraft_b1.4.html",              b:["javs"],              sz:"6.7 KB" },
{ g:"Beta",    name:"Beta 1.3",               file:"eaglercraft-beta-1.3.html",           b:["javs"],              sz:"4 MB"  },
  { g:"Beta",    name:"Beta 1.1",              file:"Eaglercraft_b1.1.html",               b:["javs"],              sz:"23 MB" },
 { g:"Beta",     name:"Beta 1.0.2",            file:"Eaglercraft_Beta_1.0.2.html",          b:["javs"],                 sz:"20.8 MB" },
  { g:"Alpha",   name:"Alpha 1.3.2",            file:"Eaglercraft_1_3_2.html",              b:["javs"],              sz:"28 MB" },
  { g:"Alpha",   name:"Alpha 1.2.6",            file:"eaglercraft-alpha-1.2.6.html",        b:["javs"],              sz:"8 MB"  },
  { g:"Indev",   name:"Infdev",       file:"infdev-wasm-gc.html",                 b:["javs"],              sz:"1.4 MB"},
  { g:"Indev",   name:"Indev 20100233",         file:"Eaglercraft_indev_20100233.html",      b:["javs"],              sz:"21 MB" },
  { g:"Indev",   name:"Indev",         file:"eagler-indev.html",                   b:["javs"],              sz:"1.1 MB"},
  { g:"Classic",       name:"Classic 0.30",    file:"eaglercraft-classic-0.30-WASM.html",      b:["wasm"],              sz:"3.6 MB"},
  { g:"Pre-Release",   name:"Pre-Release rd-160052",     file:"pre-release-160052.html",             b:["wasm"],              sz:"0.9 MB"},
  { g:"Pre-Relese",   name:"Pre-Release rd-132328)",       file:"rd-132328-WASM.html",                 b:["wasm"],              sz:"0.9 MB"},
];
 
const BADGE_CFG = {
  wisp: { cls:"badge-wisp", label:"Wisp" },
  wasm: { cls:"badge-wasm", label:"WASM" },
  javs: { cls:"badge-javs", label:"JAVS" },
};
const ORDER = ["Modern","Beta","Alpha","Indev","Classic","Pre-Release];
 
const pillTrigger = document.getElementById("pillTrigger");
const pillLabel   = document.getElementById("pillLabel");
const dropMenu    = document.getElementById("dropMenu");
const launchBtn   = document.getElementById("launchBtn");
const dlBtn       = document.getElementById("dlBtn");
 
let menuOpen = false;
let selected = null;
 
const groups = {};
CATALOG.forEach(e => { if (!groups[e.g]) groups[e.g]=[]; groups[e.g].push(e); });
ORDER.forEach(g => {
  if (!groups[g]) return;
  const hdr = document.createElement("div");
  hdr.className = "group-hdr"; hdr.textContent = g;
  dropMenu.appendChild(hdr);
  groups[g].forEach(entry => {
    const el = document.createElement("div");
    el.className = "drop-item";
    const badges = entry.b.filter(b => BADGE_CFG[b])
      .map(b => `<span class="badge ${BADGE_CFG[b].cls}">${BADGE_CFG[b].label}</span>`).join("");
    el.innerHTML = `${badges}<span>${entry.name}</span><span class="item-sz">${entry.sz}</span>`;
    el.addEventListener("click", () => {
      selected = entry;
      pillLabel.textContent = entry.name;
      pillLabel.classList.add("chosen");
 
      launchBtn.classList.add("activated");
      dlBtn.classList.add("activated");
 
      closeMenu();
    });
    dropMenu.appendChild(el);
  });
});
 
function openMenu()  { menuOpen = true;  dropMenu.classList.add("open");  pillTrigger.classList.add("open"); }
function closeMenu() { menuOpen = false; dropMenu.classList.remove("open"); pillTrigger.classList.remove("open"); }
pillTrigger.addEventListener("click", () => menuOpen ? closeMenu() : openMenu());
document.addEventListener("click", e => {
  if (!pillTrigger.contains(e.target) && !dropMenu.contains(e.target)) closeMenu();
});
 
launchBtn.addEventListener("click", () => {
  if (!selected) return;
  window.open(BASE + encodeURIComponent(selected.file), "_blank");
});
 
dlBtn.addEventListener("click", async () => {
  if (!selected) return;
  const rawUrl = RAW + encodeURIComponent(selected.file);
  dlBtn.textContent = "Downloading…";
  try {
    const res = await fetch(rawUrl);
    const blob = await res.blob();
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = selected.file;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
  } catch(e) {
    alert("Download failed.");
  }
  dlBtn.textContent = "Download";
});
</script>
</body>
</html>
